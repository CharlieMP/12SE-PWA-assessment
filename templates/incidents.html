{% extends 'base.html' %}

<!-- update the heading to be the vulnerability name that was clicked on from index.html -->

{% block heading %}
{{ vulnerability }}
{% endblock %}

{% block content %}
<div class="row">
    {% for v in vul_list %}
    <div class="col-12 col-md-12 mb-3">
        <div class="card p-3">
            <h5>Incident: {{ v.inc_name }}</h5>
            <p>{{ v.inc_year }}</p>
            <p>{{ v.inc_url }}</p>
            <form action = "{{ v.inc_url }}">
                <input type="submit" value="Open Link" />
            </form>
        </div>
    </div>
    
    {% endfor %}
<a href="/add-incident" class="btn btn-primary">Add Incident</a>
</div>
{% endblock %}
